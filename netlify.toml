[build]
  command = "npm run build"
  publish = "dist"

# SPA フォールバック（実ファイルが無いパスは index.html へ）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service Worker と manifest は常に最新を取得
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

# ビルド成果物はハッシュ付きなので長期キャッシュ
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
